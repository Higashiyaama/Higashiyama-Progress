      main {
        max-width: 800px;
        margin: 0 auto;

        padding: 20px;
        border-radius: 12px;
        border: 3px solid #d4a5d4;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        position: relative;
      }
      main::before {
        content: '';
        position: absolute;

        left: 10px;

        bottom: 10px;
        border: 2px dashed #b8a5d4;
        border-radius: 8px;
        pointer-events: none;
      }
      h1 {
        margin-top: 0;

      }
      h3 {
        color: #7a5a7a;
        font-size: 1.4rem;
        border-bottom: 2px solid #d4a5d4;
        padding-bottom: 8px;
      }
      p {
        color: #5a5a5a;
      }
      nav ul {
        padding-left: 20px;
        list-style: none;
      }
      nav li {
        margin-bottom: 8px;
      }
      nav a {
        color: #6b6b6b;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 8px;
        background: #f9f0ff;
        border: 1px solid #e6d4e6;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      nav a:hover {
        background: #f0e6ff;
        transform: translateY(-2px);
      }
    </style>
